server {
    listen 80;
    listen [::]:80;
    server_name zhuxishe.com;

    return 301 http://www.zhuxishe.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.zhuxishe.com;

    root /var/www/zhuxishe-com;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /privacy {
        try_files /privacy.html =404;
    }

    location = /terms {
        try_files /terms.html =404;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.zhuxishe.com;

    client_max_body_size 20m;

    location /auth/v1/ {
        proxy_pass https://wjjhprflldvclulistcx.supabase.co/auth/v1/;
        proxy_set_header Host wjjhprflldvclulistcx.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_ssl_server_name on;
        proxy_ssl_name wjjhprflldvclulistcx.supabase.co;
    }

    location /rest/v1/ {
        proxy_pass https://wjjhprflldvclulistcx.supabase.co/rest/v1/;
        proxy_set_header Host wjjhprflldvclulistcx.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_ssl_server_name on;
        proxy_ssl_name wjjhprflldvclulistcx.supabase.co;
    }

    location /functions/v1/ {
        proxy_pass https://wjjhprflldvclulistcx.supabase.co/functions/v1/;
        proxy_set_header Host wjjhprflldvclulistcx.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_ssl_server_name on;
        proxy_ssl_name wjjhprflldvclulistcx.supabase.co;
    }

    location /storage/v1/ {
        proxy_pass https://wjjhprflldvclulistcx.supabase.co/storage/v1/;
        proxy_set_header Host wjjhprflldvclulistcx.supabase.co;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_ssl_server_name on;
        proxy_ssl_name wjjhprflldvclulistcx.supabase.co;
    }
}
